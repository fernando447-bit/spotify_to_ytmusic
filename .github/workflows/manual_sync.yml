name: Sincronizar Spotify a YTMusic

on:
  workflow_dispatch: # Esto es lo que crea el botón manual
  schedule:
    - cron: '0 10 * * 1' # Esto lo corre solo todos los lunes a las 10 AM

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run sync
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YT_HEADERS: ${{ secrets.YT_HEADERS }}
        run: python -m spotify_to_ytmusic.main update-playlists # Si el archivo principal se llama distinto, lo corregimos luego
